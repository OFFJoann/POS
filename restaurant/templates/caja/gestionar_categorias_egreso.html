{% extends 'base/base.html' %}

{% block title %}Categorías de egresos{% endblock %}

{% block content %}
<div class="container py-3">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="bi bi-tags"></i> Categorías de egresos</h5>
                </div>
                <div class="card-body">
                    <form method="post" class="mb-4">
                        {% csrf_token %}
                        <div class="input-group">
                            <input type="text" name="nombre" class="form-control"
                                   placeholder="Nueva categoría..." required>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus-lg"></i> Agregar
                            </button>
                        </div>
                    </form>
                    <ul class="list-group">
                        {% for cat in categorias %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            {{ cat.nombre }}
                            <a href="{% url 'eliminar_categoria_egreso' cat.pk %}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Eliminar categoría {{ cat.nombre }}?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </li>
                        {% empty %}
                        <li class="list-group-item text-muted text-center">Sin categorías creadas</li>
                        {% endfor %}
                    </ul>
                </div>
                <div class="card-footer bg-white">
                    <a href="{% url 'estado_caja' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Volver a caja
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
